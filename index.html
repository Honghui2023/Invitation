<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>我们的鼓事3宴会邀请函</title>
        <link rel="stylesheet" href="./Draft1.css">
    </head>
    <body>
        <div class="stage">
            
            <div class="light center"></div>
            <div class="light left"></div>
            <div class="light right"></div>
            <div class="light right2"></div>

            <section class="intro" id=intro>
                <div class="drum" id=drum>
                    <img src="./logo.png" alt="logo" class="logo" width="400">
                </div>

                <h1>我们的鼓事3 · Our Drum Story 3</h1>
                <div class="startword">
                    点击·开启邀请函
                </div>
                <button id="openBtn">
                    接受邀请
                </button>
            </section>

            <section class="card" id=card>
                <h2>沙登鼓社 Serdang Drum Club</h2>
                <h3>我们的鼓事3 宴会邀请函</h3>
                <div class="line"></div>

                <p class="text">
                    一面鼓，一群人，一段正在开始的故事。<br/>
                    诚邀您出席我们的宴会，一起见证新的开始。
                </p>
                <div class="line"></div>

                <div class="details">
                    📅 日期: 2026年 7月 18日 <br/>
                    🕖 时间: 晚上 7:00 <br/>
                    📍 地点: <a href = "https://www.google.com/maps/dir//SK+Times+Cafe+%E2%80%A2+%E6%97%B6%E5%85%89%E5%A4%A9%E5%8F%B0,+37,+Jalan+Jinma+3,+Taman+Jinma,+43300+Seri+Kembangan,+Selangor/@3.0375936,101.6864131,15z/data=!4m8!4m7!1m0!1m5!1m1!1s0x31cdb5698bb01457:0xfe7a21f3df4777a6!2m2!1d101.7010242!2d3.015518?entry=ttu&g_ep=EgoyMDI2MDYxMC4wIKXMDSoASAFQAw%3D%3D" target = "_blank">时光天台</a>
                </div>
                
                <div class="line"></div>
                <button onclick= "window.open('https://quikrsvp.com/3-7yzh')">确认出席</button>
                <br/>
                <button class="close" id="closeBtn">
                    关闭
                </button>

            </section>
        </div>

        <!-- Connect to JavaScript-->
         <script src="script.js"></script>
    </body>

</html>
